  <title>WebAssembly RayTracer</title>

<body>
</body>

<noscript>
  <main style="display: grid">
    <h1 style="margin: auto">
      This webpage requires JavaScript to be enabled to work.
    </h1>
  </main>
</noscript>

<script>
  (async () => {
    let memory = new WebAssembly.Memory({initial: 17});
    let configObj = {
      env: {
        memory,
      }
    }
    let {module, instance} = await WebAssembly.instantiateStreaming(fetch("wasm-raytracer.wasm"), configObj);
    instance.exports.shared_buffer(0, 1);
    let bytes = new Uint8Array(memory.buffer, 0, 1);
    console.log(bytes);
  })()
</script>
<style type="text/css">
  html,
  body,
  main {
    margin: 0;
    height: 100%;
  }

</style>

</html>
